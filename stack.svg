<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 650" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="10" y="10" width="920" height="630" rx="18" fill="#ffffff" stroke="#e6e8ec" stroke-width="1.5"/>

  <!-- title -->
  <text x="40" y="54" font-size="20" font-weight="700" fill="#14161b">tesorohighlands.com — how it's built</text>
  <text x="40" y="78" font-size="12.5" fill="#6b7280">A static community hub: no backend, no database, no API keys — roughly $0/month at any scale</text>

  <!-- ================= row 1: infrastructure ================= -->
  <!-- Route 53 -->
  <g>
    <rect x="40" y="110" width="170" height="78" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="40" y="110" width="170" height="4" rx="2" fill="#6b7280"/>
    <text x="56" y="139" font-size="13" font-weight="650" fill="#14161b">AWS Route 53</text>
    <text x="56" y="158" font-size="11" fill="#6b7280">DNS for the domain</text>
    <text x="56" y="173" font-size="11" fill="#6b7280">A record → Vercel</text>
  </g>
  <!-- Vercel -->
  <g>
    <rect x="260" y="110" width="210" height="78" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="260" y="110" width="210" height="4" rx="2" fill="#14161b"/>
    <text x="276" y="139" font-size="13" font-weight="650" fill="#14161b">Vercel</text>
    <text x="276" y="158" font-size="11" fill="#6b7280">static hosting + global CDN</text>
    <text x="276" y="173" font-size="11" fill="#6b7280">HTTPS · deploys on every push</text>
  </g>
  <!-- GitHub repo -->
  <g>
    <rect x="520" y="110" width="190" height="78" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="520" y="110" width="190" height="4" rx="2" fill="#374151"/>
    <text x="536" y="139" font-size="13" font-weight="650" fill="#14161b">GitHub repo</text>
    <text x="536" y="158" font-size="11" fill="#6b7280">all site files (HTML/CSS/JS)</text>
    <text x="536" y="173" font-size="11" fill="#6b7280">+ events.json data</text>
  </g>
  <!-- GitHub Action -->
  <g>
    <rect x="760" y="110" width="140" height="78" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="760" y="110" width="140" height="4" rx="2" fill="#e8a33d"/>
    <text x="776" y="139" font-size="13" font-weight="650" fill="#14161b">GitHub Action</text>
    <text x="776" y="158" font-size="11" fill="#6b7280">cron, every ~4h</text>
    <text x="776" y="173" font-size="11" fill="#6b7280">rebuilds the events feed</text>
  </g>
  <!-- row-1 arrows -->
  <line x1="210" y1="149" x2="256" y2="149" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="520" y1="149" x2="474" y2="149" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="497" y="141" font-size="10" fill="#9ca3af" text-anchor="middle">deploy</text>
  <line x1="760" y1="149" x2="714" y2="149" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="737" y="141" font-size="10" fill="#9ca3af" text-anchor="middle">commit</text>

  <!-- ================= row 2: browser + feed sources ================= -->
  <!-- browser -->
  <g>
    <rect x="40" y="250" width="430" height="140" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="40" y="250" width="430" height="4" rx="2" fill="#2563eb"/>
    <text x="56" y="280" font-size="13.5" font-weight="650" fill="#14161b">A neighbor's browser</text>
    <text x="56" y="303" font-size="11.5" fill="#3b414c">• plain HTML + CSS + JS — no framework, no build step</text>
    <text x="56" y="322" font-size="11.5" fill="#3b414c">• Leaflet map, self-hosted (works even when CDNs don't)</text>
    <text x="56" y="341" font-size="11.5" fill="#3b414c">• localStorage: theme · go-bag checklist · home location</text>
    <text x="56" y="360" font-size="11.5" fill="#3b414c">• honest failure states — a dead feed never fakes "all clear"</text>
  </g>
  <!-- feed sources -->
  <g>
    <rect x="540" y="250" width="360" height="140" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="540" y="250" width="360" height="4" rx="2" fill="#e8a33d"/>
    <text x="556" y="280" font-size="13.5" font-weight="650" fill="#14161b">Events feed (built by the Action)</text>
    <rect x="556" y="296" width="162" height="26" rx="13" fill="#fdf2e2" stroke="#f4dcb6"/>
    <text x="637" y="313" font-size="11" fill="#a25a09" text-anchor="middle">Eventbrite public pages</text>
    <rect x="728" y="296" width="152" height="26" rx="13" fill="#fdf2e2" stroke="#f4dcb6"/>
    <text x="804" y="313" font-size="11" fill="#a25a09" text-anchor="middle">SC Library calendar</text>
    <text x="556" y="345" font-size="11" fill="#6b7280">filtered · priced · audience-tagged → events.json</text>
    <text x="556" y="362" font-size="11" fill="#6b7280">(a source that's down carries forward — never wiped)</text>
  </g>
  <!-- row-2 arrows -->
  <line x1="300" y1="188" x2="255" y2="246" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="240" y="218" font-size="10" fill="#9ca3af">page + assets</text>
  <line x1="830" y1="188" x2="770" y2="246" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ================= row 3: live data ================= -->
  <text x="40" y="446" font-size="12.5" font-weight="650" fill="#3b414c">Live safety data — fetched directly by each visitor's browser (free · keyless · CORS-open):</text>
  <line x1="255" y1="390" x2="255" y2="456" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="265" y="420" font-size="10" fill="#9ca3af">live fetches on every visit</text>

  <g>
    <rect x="40" y="460" width="164" height="92" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="40" y="460" width="164" height="4" rx="2" fill="#17703f"/>
    <text x="54" y="488" font-size="12.5" font-weight="650" fill="#14161b">Open-Meteo</text>
    <text x="54" y="507" font-size="10.5" fill="#6b7280">air quality · fire weather</text>
    <text x="54" y="522" font-size="10.5" fill="#6b7280">7-day outlook</text>
  </g>
  <g>
    <rect x="218" y="460" width="164" height="92" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="218" y="460" width="164" height="4" rx="2" fill="#17703f"/>
    <text x="232" y="488" font-size="12.5" font-weight="650" fill="#14161b">NWS · weather.gov</text>
    <text x="232" y="507" font-size="10.5" fill="#6b7280">Red Flag warnings</text>
    <text x="232" y="522" font-size="10.5" fill="#6b7280">official alerts</text>
  </g>
  <g>
    <rect x="396" y="460" width="164" height="92" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="396" y="460" width="164" height="4" rx="2" fill="#17703f"/>
    <text x="410" y="488" font-size="12.5" font-weight="650" fill="#14161b">NIFC / WFIGS</text>
    <text x="410" y="507" font-size="10.5" fill="#6b7280">active fires + perimeters</text>
    <text x="410" y="522" font-size="10.5" fill="#6b7280">(list, map, status strip)</text>
  </g>
  <g>
    <rect x="574" y="460" width="164" height="92" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="574" y="460" width="164" height="4" rx="2" fill="#17703f"/>
    <text x="588" y="488" font-size="12.5" font-weight="650" fill="#14161b">Cal OES</text>
    <text x="588" y="507" font-size="10.5" fill="#6b7280">evacuation zones</text>
    <text x="588" y="522" font-size="10.5" fill="#6b7280">order / warning status</text>
  </g>
  <g>
    <rect x="752" y="460" width="148" height="92" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="752" y="460" width="148" height="4" rx="2" fill="#17703f"/>
    <text x="766" y="488" font-size="12.5" font-weight="650" fill="#14161b">Carto / OSM</text>
    <text x="766" y="507" font-size="10.5" fill="#6b7280">map tiles</text>
    <text x="766" y="522" font-size="10.5" fill="#6b7280">(auto-fallback)</text>
  </g>

  <!-- footer -->
  <text x="40" y="590" font-size="11.5" fill="#6b7280">Every visitor pulls data with their own requests — nothing routes through a server the owner runs, so traffic can never generate a bill.</text>
  <text x="40" y="612" font-size="11" fill="#9ca3af">github.com/hamidettefagh/tesorohighlands  ·  live at tesorohighlands.com  ·  built with Claude Code</text>
</svg>
