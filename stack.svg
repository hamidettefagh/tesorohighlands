<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 640" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect x="10" y="10" width="920" height="620" rx="18" fill="#ffffff" stroke="#e6e8ec" stroke-width="1.5"/>

  <text x="40" y="54" font-size="20" font-weight="700" fill="#14161b">How tesorohighlands.com works</text>
  <text x="40" y="78" font-size="12.5" fill="#6b7280">A neighbor-built community site. No accounts, no logins, no ads — only anonymous, cookieless visit counts.</text>

  <g>
    <rect x="40" y="104" width="400" height="112" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="40" y="104" width="400" height="4" rx="2" fill="#14161b"/>
    <text x="56" y="132" font-size="13.5" font-weight="650" fill="#14161b">The website</text>
    <text x="56" y="154" font-size="11.5" fill="#3b414c">Simple, fast pages — nothing to install, nothing to sign up for.</text>
    <text x="56" y="176" font-size="11" fill="#6b7280">For the technical: hand-written HTML, CSS, and JavaScript.</text>
    <text x="56" y="192" font-size="11" fill="#6b7280">No frameworks, no build step, served over secure HTTPS.</text>
  </g>
  <line x1="440" y1="160" x2="496" y2="160" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="468" y="150" font-size="10.5" fill="#9ca3af" text-anchor="middle">opens like any page</text>
  <g>
    <rect x="500" y="104" width="400" height="112" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="500" y="104" width="400" height="4" rx="2" fill="#2563eb"/>
    <text x="516" y="132" font-size="13.5" font-weight="650" fill="#14161b">Your phone or computer</text>
    <text x="516" y="154" font-size="11.5" fill="#3b414c">Everything runs right on your device — it asks the official</text>
    <text x="516" y="170" font-size="11.5" fill="#3b414c">sources directly for the latest data, every time you look.</text>
    <text x="516" y="192" font-size="11" fill="#6b7280">Your checklist, theme, and location are saved only on your device.</text>
  </g>

  <text x="40" y="258" font-size="12.5" font-weight="650" fill="#3b414c">The live safety data comes straight from official public sources:</text>
  <line x1="700" y1="216" x2="700" y2="270" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <g>
    <rect x="40" y="276" width="164" height="98" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="40" y="276" width="164" height="4" rx="2" fill="#17703f"/>
    <text x="54" y="303" font-size="12.5" font-weight="650" fill="#14161b">Air &amp; weather</text>
    <text x="54" y="322" font-size="10.5" fill="#6b7280">Open-Meteo</text>
    <text x="54" y="340" font-size="10.5" fill="#6b7280">air quality · wind · humidity</text>
    <text x="54" y="355" font-size="10.5" fill="#6b7280">7-day fire-weather outlook</text>
  </g>
  <g>
    <rect x="218" y="276" width="164" height="98" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="218" y="276" width="164" height="4" rx="2" fill="#17703f"/>
    <text x="232" y="303" font-size="12.5" font-weight="650" fill="#14161b">Official alerts</text>
    <text x="232" y="322" font-size="10.5" fill="#6b7280">National Weather Service</text>
    <text x="232" y="340" font-size="10.5" fill="#6b7280">red flag · heat · wind</text>
    <text x="232" y="355" font-size="10.5" fill="#6b7280">with forecast context</text>
  </g>
  <g>
    <rect x="396" y="276" width="164" height="98" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="396" y="276" width="164" height="4" rx="2" fill="#17703f"/>
    <text x="410" y="303" font-size="12.5" font-weight="650" fill="#14161b">Active fires</text>
    <text x="410" y="322" font-size="10.5" fill="#6b7280">federal interagency feed</text>
    <text x="410" y="340" font-size="10.5" fill="#6b7280">live locations + perimeters</text>
    <text x="410" y="355" font-size="10.5" fill="#6b7280">stale records filtered out</text>
  </g>
  <g>
    <rect x="574" y="276" width="164" height="98" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="574" y="276" width="164" height="4" rx="2" fill="#17703f"/>
    <text x="588" y="303" font-size="12.5" font-weight="650" fill="#14161b">Evacuation zones</text>
    <text x="588" y="322" font-size="10.5" fill="#6b7280">state emergency services</text>
    <text x="588" y="340" font-size="10.5" fill="#6b7280">orders &amp; warnings,</text>
    <text x="588" y="355" font-size="10.5" fill="#6b7280">checked for our area</text>
  </g>
  <g>
    <rect x="752" y="276" width="148" height="98" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="752" y="276" width="148" height="4" rx="2" fill="#17703f"/>
    <text x="766" y="303" font-size="12.5" font-weight="650" fill="#14161b">The map</text>
    <text x="766" y="322" font-size="10.5" fill="#6b7280">OpenStreetMap imagery</text>
    <text x="766" y="340" font-size="10.5" fill="#6b7280">map engine ships with</text>
    <text x="766" y="355" font-size="10.5" fill="#6b7280">the site, with a backup</text>
  </g>

  <g>
    <rect x="40" y="414" width="860" height="112" rx="12" fill="#f8f9fb" stroke="#e2e5ea"/>
    <rect x="40" y="414" width="860" height="4" rx="2" fill="#e8a33d"/>
    <text x="56" y="442" font-size="13.5" font-weight="650" fill="#14161b">Local events that update themselves</text>
    <text x="56" y="464" font-size="11.5" fill="#3b414c">A scheduled helper sweeps the City calendar, Eventbrite, and the library — plus an AI web-search pass for the rest.</text>
    <text x="56" y="486" font-size="11" fill="#6b7280">For the technical: events are filtered to Santa Clarita Valley venues, price-checked, tagged by audience (toddlers · kids · teens · adults),</text>
    <text x="56" y="502" font-size="11" fill="#6b7280">deduped, recurring items roll forward, past events drop off live — and AI finds always link to their source page.</text>
  </g>

  <text x="40" y="566" font-size="11.5" font-weight="650" fill="#3b414c">Privacy, by design: no accounts, no ads, no cookies — only anonymous visit counts; your settings never leave your device.</text>
  <text x="40" y="590" font-size="11" fill="#9ca3af">tesorohighlands.com — a neighbor project for the Tesoro Highlands community</text>
</svg>
