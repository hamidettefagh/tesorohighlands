name: Refresh local feed

on:
  schedule:
    # Eventbrite currently 405-blocks GitHub runner IPs (checked 2026-07-07);
    # the script fails soft and keeps the last good file. Kept on a light
    # cadence so it self-heals if the block ever lifts. Real refreshes happen
    # by running scripts/fetch-events.mjs from a residential IP and pushing.
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency: refresh-events

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch feeds
        run: node scripts/fetch-events.mjs
      - name: Fetch road closures
        run: node scripts/fetch-roads.mjs
      - name: Commit if changed
        run: |
          git add events.json roads.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git config user.name "tesoro-events-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh local feeds"
            git pull --rebase origin main || true
            git push
          fi
